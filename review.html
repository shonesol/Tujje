<!DOCTYPE html>
<html>
<head>

<title>Tujje Safari - Customer Reviews</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

body{
margin:0;
font-family:Arial;
background:#F5E6CC;
}


header{

background:#0B1F3B;
color:white;
text-align:center;
padding:30px;

}

header h1{

color:#D4AF37;

}


.container{

max-width:500px;
background:#FFF8EE;
margin:40px auto;
padding:30px;
border-radius:20px;

box-shadow:0 10px 25px #999;

}


input,textarea{

width:100%;
padding:15px;
margin:10px 0;

border:2px solid #D4AF37;

border-radius:10px;

font-size:16px;

}


textarea{

height:120px;

}


.stars{

text-align:center;

}


.stars span{

font-size:40px;

color:#ccc;

cursor:pointer;

}


.stars .active{

color:#D4AF37;

}


button{

width:100%;

padding:15px;

background:#F28C28;

color:white;

border:0;

border-radius:30px;

font-size:18px;

cursor:pointer;

}


button:hover{

background:#D4AF37;

color:#0B1F3B;

}


#message{

text-align:center;

color:green;

}



</style>


</head>


<body>


<header>

<h1>Tujje Safari</h1>

<p>Share Your Safari Experience</p>

</header>



<div class="container">


<h2>Leave A Review</h2>


<input id="name" placeholder="Your Name">


<input id="country" placeholder="Your Country">


<div class="stars">

<span onclick="star(1)">★</span>

<span onclick="star(2)">★</span>

<span onclick="star(3)">★</span>

<span onclick="star(4)">★</span>

<span onclick="star(5)">★</span>

</div>


<textarea id="review" placeholder="Write your review"></textarea>


<button onclick="sendReview()">

Submit Review

</button>


<p id="message"></p>


</div>




<script type="module">


import {initializeApp}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import {

getFirestore,

collection,

addDoc,

serverTimestamp

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";





// PASTE YOUR FIREBASE CONFIG HERE


const firebaseConfig={


apiKey:"YOUR_API_KEY",

authDomain:"YOUR_AUTH_DOMAIN",

projectId:"YOUR_PROJECT_ID",

storageBucket:"YOUR_STORAGE_BUCKET",

messagingSenderId:"YOUR_MESSAGING_ID",

appId:"YOUR_APP_ID"


};





const app=initializeApp(firebaseConfig);


const db=getFirestore(app);



let rating=0;



window.star=function(num){


rating=num;


document.querySelectorAll(".stars span")
.forEach((s,i)=>{


s.classList.toggle(
"active",
i<num
);


});


}



window.sendReview=async function(){


let name=document.getElementById("name").value;

let country=document.getElementById("country").value;

let review=document.getElementById("review").value;



if(!name || !review || rating==0){

alert("Complete all fields");

return;

}



await addDoc(
collection(db,"reviews"),
{


name:name,

country:country,

review:review,

rating:rating,

date:serverTimestamp()


});



document.getElementById("message").innerHTML=
"Thank you for your review ⭐";


}


</script>


</body>
</html>
