<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Tujje Safaris Guest Reviews</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#fff8e6;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 10px 20px #ccc;
}

h1{
text-align:center;
color:#ff8f00;
}

input,textarea,select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ddd;
}

button{
width:100%;
padding:14px;
background:linear-gradient(90deg,#1e88e5,#ff8f00,#d4af37);
border:none;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
}


.share{
margin-top:20px;
text-align:center;
}


.share a{
display:inline-block;
padding:10px;
margin:5px;
background:#1e88e5;
color:white;
border-radius:8px;
text-decoration:none;
}


</style>

</head>


<body>


<div class="container">


<h1>⭐ Share Your Safari Experience</h1>


<input id="name" placeholder="Your Name">


<input id="country" placeholder="Your Country">


<select id="rating">

<option value="5">⭐⭐⭐⭐⭐</option>
<option value="4">⭐⭐⭐⭐</option>
<option value="3">⭐⭐⭐</option>
<option value="2">⭐⭐</option>
<option value="1">⭐</option>

</select>


<textarea id="review" placeholder="Write your review"></textarea>


<button onclick="submitReview()">
Submit Review
</button>



<div class="share">

<h3>Share Review Page</h3>


<a onclick="shareWhatsApp()">
WhatsApp
</a>


<a onclick="shareFacebook()">
Facebook
</a>


<a onclick="copyLink()">
Copy Link
</a>


</div>


</div>


<script type="module" src="review.js"></script>


</body>
</html>
