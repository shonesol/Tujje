<style>
:root{
  --blue:#1565c0;
  --orange:#ff9800;
  --gold:#d4af37;
  --dark:#0f172a;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:var(--dark);color:white;}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  background:rgba(0,0,0,0.7);
  position:fixed;
  width:100%;
  top:0;
  z-index:1000;
  backdrop-filter:blur(10px);
}

.logo{color:var(--gold);font-weight:800;font-size:20px;}

.home-btn{
  background:linear-gradient(45deg,var(--orange),var(--gold));
  padding:8px 15px;
  border-radius:20px;
  color:black;
  text-decoration:none;
  font-weight:bold;
}

/* HERO */
.hero{
  height:100vh;
  background:url('4a7fea4f-ee9e-4104-9754-06c36312b0b0.jpeg') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}

.hero::after{
  content:"";
  position:absolute;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
}

.hero-content{
  position:relative;
  z-index:2;
}

.hero h1{font-size:45px;color:var(--gold);}
.hero p{color:#ddd;margin-top:10px;}

/* SECTION TITLE */
.section-title{
  text-align:center;
  margin:60px 0 20px;
  color:var(--orange);
  font-size:28px;
}

/* SWIPER */
.swiper{
  width:90%;
}
.swiper-slide img{
  width:100%;
  height:400px;
  object-fit:cover;
  border-radius:15px;
  border:3px solid var(--gold);
}

/* GRID GALLERY */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  padding:20px;
}

.grid img,.grid video{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:12px;
  cursor:pointer;
  border:2px solid var(--blue);
  transition:0.3s;
}

.grid img:hover,.grid video:hover{
  transform:scale(1.05);
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:2000;
}

.modal img,.modal video{
  max-width:90%;
  max-height:80%;
  border-radius:15px;
}

.close{
  position:absolute;
  top:20px;
  right:30px;
  font-size:30px;
  color:white;
  cursor:pointer;
}

.nav-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:40px;
  color:white;
  cursor:pointer;
  user-select:none;
}

.prev{left:20px;}
.next{right:20px;}

</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
let swiper = new Swiper(".mySwiper", {
  loop:true,
  autoplay:{delay:2500}
});

/* MODAL SYSTEM */
let items = [];
let index = 0;

const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");
const modalVideo = document.getElementById("modalVideo");

/* collect images + videos */
document.querySelectorAll(".grid img, .grid video").forEach((el, i)=>{
  items.push(el);

  el.addEventListener("click", ()=>{
    index = i;
    openModal(el);
  });
});

function openModal(el){
  modal.style.display="flex";

  if(el.tagName==="IMG"){
    modalImg.style.display="block";
    modalVideo.style.display="none";
    modalImg.src = el.src;
  }else{
    modalImg.style.display="none";
    modalVideo.style.display="block";
    modalVideo.src = el.src;
    modalVideo.play();
  }
}

function closeModal(){
  modal.style.display="none";
  modalVideo.pause();
}

function next(){
  index = (index+1)%items.length;
  openModal(items[index]);
}

function prev(){
  index = (index-1+items.length)%items.length;
  openModal(items[index]);
}

/* close on background click */
modal.addEventListener("click",(e)=>{
  if(e.target===modal) closeModal();
});
  /* AUTOPLAY VIDEOS IN GALLERY */
document.querySelectorAll(".grid video").forEach(video => {
    video.autoplay = true;
    video.muted = true;        // Required for autoplay
    video.loop = true;
    video.playsInline = true;
    video.controls = false;
    video.load();

    video.play().catch(error => {
        console.log("Autoplay blocked:", error);
    });
});
</script>
